name: Keep Repository Active

on:
  schedule:
    - cron: "0 0 * * 0"   # once a week, Sunday at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Touch keepalive file
        run: |
          date > .keepalive
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .keepalive
          git commit -m "Keepalive ping" || echo "No changes"
          git push
