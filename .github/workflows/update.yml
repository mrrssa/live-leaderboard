name: Update Leaderboard Image

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Playwright
        run: npm install playwright

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run screenshot script
        run: node screenshot.js

      - name: Commit updated image
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add leaderboard.png
          git commit -m "Updated leaderboard image" || echo "No changes"
          git push

      - name: Update Discord message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MESSAGE_ID: ${{ secrets.DISCORD_MESSAGE_ID }}
        run: |
          TIMESTAMP=$(date +%s)
          JSON_PAYLOAD=$(jq -n \
            --arg url "https://mrrssa.github.io/live-leaderboard/leaderboard.png?ts=$TIMESTAMP" \
            '{
              "content": "**Live Leaderboard**",
              "embeds": [
                {
                  "title": "Leaderboard",
                  "image": { "url": $url }
                }
              ]
            }')

          curl -X PATCH \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            "$DISCORD_WEBHOOK/messages/$MESSAGE_ID"
